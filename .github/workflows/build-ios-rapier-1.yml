name: Build iOS Rapier Native

on:
  workflow_dispatch:   # 手动触发

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 安装 Rust
      - uses: dtolnay/rust-toolchain@stable

      # 3. 安装 iOS target
      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      # 4. 编译 Rapier
      - name: Build Rapier
        run: |
          cd common/src/main/rust/rapier
          cargo build --release --target aarch64-apple-ios

      # 5. 上传编译好的文件
      - name: Upload iOS native
        uses: actions/upload-artifact@v4
        with:
          name: ios-native
          path: common/src/main/rust/rapier/target/aarch64-apple-ios/release/*
