name: Build iOS Rapier Native

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly + components
        run: |
          rustup toolchain install nightly
          rustup default nightly
          rustup target add aarch64-apple-ios
          rustup component add rust-src --toolchain nightly

      - name: Fix panic strategy (important for new nightly)
        run: |
          echo "[profile.release]" >> common/src/main/rust/Cargo.toml
          echo "panic = \"immediate-abort\"" >> common/src/main/rust/Cargo.toml

      - name: Build iOS native (build-std enabled)
        run: |
          cd common/src/main/rust/rapier
          cargo +nightly build --release \
            --target aarch64-apple-ios \
            -Z build-std=std,panic_abort

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-native
          path: common/src/main/rust/rapier/target/aarch64-apple-ios/release/*
