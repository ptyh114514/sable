name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1️⃣ 固定 Rust（必须稳定，否则你之前 SIMD / core 会炸）
      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly-2025-01-01
          rustup default nightly-2025-01-01
          rustup component add rust-src

      # 2️⃣ iOS target
      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      # 3️⃣ Build
      - name: Build Rapier for iOS
        working-directory: common/src/main/rust/rapier
        run: |
          cargo build --release --target aarch64-apple-ios --lib

      # 4️⃣ Safe copy (不再乱跳目录)
      - name: Copy built library
        run: |
          mkdir -p $GITHUB_WORKSPACE/ios/libs

          find target/aarch64-apple-ios/release \
            -name "*.dylib" -o -name "*.a" | while read f; do
              cp "$f" "$GITHUB_WORKSPACE/ios/libs/"
          done

      # 5️⃣ 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-rapier
          path: ios/libs
