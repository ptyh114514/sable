name: Build iOS Rapier Native

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-ios
          override: true

      - name: Build Rapier
        run: |
          cd common/src/main/rust/rapier
          cargo build --release --target aarch64-apple-ios

      - name: Upload iOS native
        uses: actions/upload-artifact@v4
        with:
          name: ios-native
          path: common/src/main/rust/rapier/target/aarch64-apple-ios/release/*
