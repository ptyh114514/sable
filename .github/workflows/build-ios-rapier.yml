name: Build iOS Rapier Native

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup default stable
          rustup target add aarch64-apple-ios
          rustup show

      - name: Verify Targets
        run: rustup target list --installed

      - name: Build Rapier
        run: |
          cd common/src/main/rust/rapier
          cargo build --target aarch64-apple-ios --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-native
          path: common/src/main/rust/rapier/target/aarch64-apple-ios/release/*
