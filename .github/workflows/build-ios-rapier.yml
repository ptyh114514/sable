name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust nightly
        run: |
          rustup install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build Rapier for iOS aarch64
        run: |
          cd common/src/main/rust/rapier
          cargo build --release --target aarch64-apple-ios --lib

      - name: Copy built dylib
        run: |
          mkdir -p $GITHUB_WORKSPACE/ios/libs
          find common/src/main/rust/rapier/target \
            -type f \( -name "*.dylib" -o -name "*.a" \) \
            -exec cp {} $GITHUB_WORKSPACE/ios/libs/ \;
          echo "=== FINAL OUTPUT ==="
          ls -R $GITHUB_WORKSPACE/ios/libs

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-rapier-dylib
          path: ios/libs/**/libsable_rapier*.dylib
