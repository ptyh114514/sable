name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 安装固定 nightly（避免版本漂移）
      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      # iOS target
      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      # 编译 Rapier
      - name: Build Rapier iOS
        run: |
          cd common/src/main/rust/rapier
          cargo build --release --target aarch64-apple-ios

      # 🔍 debug：确认有没有生成文件（很重要）
      - name: Check output
        run: |
          echo "==== release dir ===="
          ls -R common/src/main/rust/rapier/target/aarch64-apple-ios/release || true

      # 拷贝产物（只找 dylib / a）
      - name: Collect output
        run: |
          mkdir -p ios/libs

          FILE=$(find common/src/main/rust/rapier/target/aarch64-apple-ios/release \
            -maxdepth 1 \
            -name "*.dylib" -o -name "*.a" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ 没找到 dylib 或 a"
            exit 1
          fi

          echo "✅ found: $FILE"
          cp "$FILE" ios/libs/

      # 上传构建结果
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-rapier
          path: ios/libs/
