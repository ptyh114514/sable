name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust nightly
        run: |
          rustup install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build Rapier for iOS aarch64
        run: |
          cd common/src/main/rust/rapier
          cargo build --release --target aarch64-apple-ios

      - name: Copy built dylib
        run: |
          mkdir -p $GITHUB_WORKSPACE/ios/libs
          # 使用 cargo 输出路径环境变量
          LIB_DIR="common/src/main/rust/rapier/target/aarch64-apple-ios/release"
          echo "Looking in $LIB_DIR"
          if [ -d "$LIB_DIR" ]; then
            find "$LIB_DIR" -name "*.dylib" -o -name "*.a" | while read file; do
              echo "Copying $file"
              cp "$file" $GITHUB_WORKSPACE/ios/libs/
            done
          else
            echo "Error: $LIB_DIR does not exist!"
            exit 1
          fi
