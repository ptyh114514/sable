name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build dylib (FIXED)
        run: |
          cd common/src/main/rust/rapier

          cargo build -Z build-std=core,alloc,std \
            --release \
            --target aarch64-apple-ios

          echo "=== CHECK OUTPUT ==="
          find target -type f -name "*.dylib" || echo "NO DYLIB FOUND"
          find target -type f -name "*.a" || echo "NO STATIC LIB FOUND"

      - name: Copy output
        run: |
          mkdir -p ios/libs

          find common/src/main/rust/rapier/target \
            -type f \( -name "*.dylib" -o -name "*.a" \) \
            -exec cp {} ios/libs/ \;

          echo "=== FINAL OUTPUT ==="
          ls -R ios/libs
