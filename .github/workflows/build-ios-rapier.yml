name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust nightly
        run: |
          rustup install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build Rapier for iOS aarch64
        run: |
          cd common/src/main/rust/rapier
          cargo build --release --target aarch64-apple-ios

      - name: Copy built staticlib / dylib to ios/libs
        run: |
          mkdir -p ios/libs
          # 根据 Cargo.toml 的 crate-type 输出选择拷贝
          if [ -f target/aarch64-apple-ios/release/libsable_rapier.a ]; then
            cp target/aarch64-apple-ios/release/libsable_rapier.a ios/libs/
          elif [ -f target/aarch64-apple-ios/release/libsable_rapier.dylib ]; then
            cp target/aarch64-apple-ios/release/libsable_rapier.dylib ios/libs/
          else
            echo "❌ 构建成功，但没有找到任何输出文件"
            exit 1
          fi
