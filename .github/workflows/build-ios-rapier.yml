name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust nightly
        run: |
          rustup install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build Rapier for iOS aarch64
        run: |
          # 固定输出目录（关键）
          export CARGO_TARGET_DIR=$GITHUB_WORKSPACE/target-ios

          # 编译指定 crate
          cargo build \
            --manifest-path common/src/main/rust/rapier/Cargo.toml \
            --release \
            --target aarch64-apple-ios

          echo "=== BUILD OUTPUT CHECK ==="
          find $CARGO_TARGET_DIR -type f | head -n 50 || true

      - name: Collect dylib output
        run: |
          mkdir -p ios/libs

          find $GITHUB_WORKSPACE/target-ios \
            -type f \( -name "*.dylib" -o -name "*.a" \) \
            -exec cp {} ios/libs/ \;

          echo "=== FINAL IOS LIBS ==="
          ls -R ios/libs || true

      - name: Upload iOS dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-rapier-dylib
          path: |
            ios/libs/**/*.dylib
            ios/libs/**/*.a
