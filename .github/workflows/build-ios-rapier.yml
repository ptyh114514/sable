name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust nightly
        run: |
          rustup install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      # ✅ 关键：生成动态库（dylib）
      - name: Build Rapier as dylib for iOS
        run: |
          cd common/src/main/rust/rapier
          # cargo.toml 内要有 crate-type = ["cdylib"] 或 ["dylib"] 才能生成 dylib
          cargo build --release --target aarch64-apple-ios --lib --crate-type cdylib

      # ✅ 上传 artifact
      - name: Collect output
        run: |
          mkdir -p ios/libs
          # 现在目录一定存在
          cp common/src/main/rust/rapier/target/aarch64-apple-ios/release/*.dylib ios/libs/
          echo "=== files ==="
          ls -R ios/libs

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-rapier-libs
          path: ios/libs/
