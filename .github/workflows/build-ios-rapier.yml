```yaml
name: Build iOS Rapier Native

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.82.0
          rustup default 1.82.0
          rustup target add aarch64-apple-ios --toolchain 1.82.0

      - name: Change edition 2024 -> 2021
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("common/src/main/rust/Cargo.toml")
          text = p.read_text()

          text = text.replace('edition = "2024"', 'edition = "2021"')

          p.write_text(text)

          print("patched edition")
          PY

      - name: Build Rapier
        run: |
          cd common/src/main/rust/rapier
          cargo +1.82.0 build --release --target aarch64-apple-ios

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-native
          path: common/src/main/rust/rapier/target/aarch64-apple-ios/release/*
```
