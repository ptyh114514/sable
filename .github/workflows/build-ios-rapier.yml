name: Build iOS Rapier Native

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.82
        run: |
          rustup toolchain install 1.82.0
          rustup default 1.82.0
          rustup target add aarch64-apple-ios --toolchain 1.82.0

      - name: Patch Rust Edition
        run: |
          sed -i '' 's/edition = "2024"/edition = "2021"/g' common/src/main/rust/Cargo.toml

      - name: Build Rapier
        run: |
          cd common/src/main/rust/rapier
          cargo +1.82.0 build --release --target aarch64-apple-ios

      - name: Upload iOS Native
        uses: actions/upload-artifact@v4
        with:
          name: ios-native
          path: common/src/main/rust/rapier/target/aarch64-apple-ios/release/*
```
