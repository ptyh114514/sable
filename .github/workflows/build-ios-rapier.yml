name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust nightly
        run: |
          rustup install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build Rapier for iOS aarch64
        run: |
          # 固定 target 目录，避免找不到
          export CARGO_TARGET_DIR=$GITHUB_WORKSPACE/target-ios

          # 进入 crate 目录，构建 release
          cargo build \
            --manifest-path common/src/main/rust/rapier/Cargo.toml \
            --release \
            --target aarch64-apple-ios

          echo "=== CHECK OUTPUT ==="
          find $CARGO_TARGET_DIR -type f | head -n 50

      - name: Copy built dylib and static libraries
        run: |
          mkdir -p ios/libs

          # 拷贝所有 dylib 和 a 文件
          find $GITHUB_WORKSPACE/target-ios \
            -type f \( -name "*.dylib" -o -name "*.a" \) \
            -exec cp {} ios/libs/ \;

          echo "=== FINAL OUTPUT ==="
          ls -R ios/libs
