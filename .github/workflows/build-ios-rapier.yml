name: Build iOS Rapier

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly-2026-01-29
          rustup default nightly-2026-01-29
          rustup component add rust-src

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build Rapier (force output dir)
        run: |
          cd common/src/main/rust/rapier

          export CARGO_TARGET_DIR=$GITHUB_WORKSPACE/target-ios

          cargo build \
            --release \
            --target aarch64-apple-ios

          echo "=== BUILD OUTPUT CHECK ==="
          find $CARGO_TARGET_DIR -type f | head -n 50 || true

      - name: Collect dylib/a
        run: |
          mkdir -p $GITHUB_WORKSPACE/ios/libs

          find $GITHUB_WORKSPACE/target-ios \
            -type f \( -name "*.dylib" -o -name "*.a" \) \
            -exec cp {} $GITHUB_WORKSPACE/ios/libs/ \;

          echo "=== FINAL OUTPUT ==="
          ls -R $GITHUB_WORKSPACE/ios/libs || true
